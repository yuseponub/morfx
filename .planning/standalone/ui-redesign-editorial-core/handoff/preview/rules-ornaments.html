<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>morfx — Rules & Ornaments</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--paper-1); }
  body { font-family: var(--font-serif); color: var(--ink-1); padding: 20px 24px; }
  .eyebrow { font-variant: small-caps; letter-spacing: 0.1em; color: var(--rubric-2); font-size: 12px; margin: 0 0 4px; font-weight: 600; }
  .row { display: grid; grid-template-columns: 100px 1fr; gap: 8px 14px; align-items: center; font-size: 12px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
  hr.hair { border: 0; border-top: 1px solid var(--border); margin: 0; }
  hr.thin { border: 0; border-top: 1px solid var(--ink-1); margin: 0; }
  hr.thick { border: 0; border-top: 3px solid var(--ink-1); margin: 0; }
  hr.d { height: 5px; border: 0; margin: 0; background: linear-gradient(var(--ink-1),var(--ink-1)) top/100% 1px no-repeat, linear-gradient(var(--ink-1),var(--ink-1)) bottom/100% 1px no-repeat; }
  .orn { text-align: center; color: var(--ink-3); letter-spacing: 0.6em; font-size: 12px; }
</style>
</head>
<body>
  <p class="eyebrow">Reglas &amp; ornamentos</p>
  <hr class="d" style="margin: 6px 0 14px;">
  <div class="row">
    <span class="tag">hair</span><hr class="hair">
    <span class="tag">thin</span><hr class="thin">
    <span class="tag">thick</span><hr class="thick">
    <span class="tag">double</span><hr class="d">
    <span class="tag">ornament</span><div class="orn">❦ &nbsp; § § § &nbsp; ❦</div>
    <span class="tag">chapter</span><div class="orn" style="color:var(--rubric-2); letter-spacing:0.8em;">· · ·</div>
  </div>
</body>
</html>
