<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>morfx — Type: Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--paper-1); }
  body { font-family: var(--font-serif); color: var(--ink-1); padding: 20px 28px; }
  .eyebrow { font-variant: small-caps; letter-spacing: 0.1em; color: var(--rubric-2); font-size: 12px; margin: 0 0 4px; font-weight: 600; }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1.02; letter-spacing: -0.02em; margin: 0; }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--ink-3); margin: 6px 0 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 10px; }
  hr.d { height: 5px; border: 0; margin: 8px 0 12px; background: linear-gradient(var(--ink-1),var(--ink-1)) top/100% 1px no-repeat, linear-gradient(var(--ink-1),var(--ink-1)) bottom/100% 1px no-repeat; }
</style>
</head>
<body>
  <p class="eyebrow">Tipografía · display</p>
  <hr class="d">
  <div class="title">morf·x</div>
  <div class="sub">Platform for WhatsApp commerce &amp; customer relations.</div>
  <div class="meta">EB&nbsp;Garamond · 700 · 56/57 · tracking −0.02em</div>
</body>
</html>
