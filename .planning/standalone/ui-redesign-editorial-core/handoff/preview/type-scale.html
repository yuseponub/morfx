<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>morfx — Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--paper-1); }
  body { font-family: var(--font-serif); color: var(--ink-1); padding: 18px 24px; }
  .eyebrow { font-variant: small-caps; letter-spacing: 0.1em; color: var(--rubric-2); font-size: 12px; margin: 0 0 4px; font-weight: 600; }
  hr.d { height: 5px; border: 0; margin: 6px 0 10px; background: linear-gradient(var(--ink-1),var(--ink-1)) top/100% 1px no-repeat, linear-gradient(var(--ink-1),var(--ink-1)) bottom/100% 1px no-repeat; }
  .row { display:grid; grid-template-columns: 70px 1fr; gap: 10px 14px; align-items: baseline; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); padding-top: 6px; }
</style>
</head>
<body>
  <p class="eyebrow">Tipografía · escala</p>
  <hr class="d">
  <div class="row">
    <div class="tag">H1 · 44</div><div class="mx-h1">Bandeja de entrada</div>
    <div class="tag">H2 · 32</div><div class="mx-h2">Conversaciones activas</div>
    <div class="tag">H3 · 24</div><div class="mx-h3">Detalles del contacto</div>
    <div class="tag">H4 · 19</div><div class="mx-h4">Notas internas</div>
    <div class="tag">Body · 16</div><div class="mx-body">El mensaje se envió correctamente al destinatario.</div>
    <div class="tag">Caption · 12</div><div class="mx-caption">Actualizado hace 3 minutos.</div>
  </div>
</body>
</html>
