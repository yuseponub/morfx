<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>morfx — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--paper-1); }
  body { font-family: var(--font-serif); color: var(--ink-1); padding: 22px 24px; }
  .eyebrow { font-variant: small-caps; letter-spacing: 0.1em; color: var(--rubric-2); font-size: 12px; margin: 0 0 4px; font-weight: 600; }
  hr.d { height: 5px; border: 0; margin: 6px 0 16px; background: linear-gradient(var(--ink-1),var(--ink-1)) top/100% 1px no-repeat, linear-gradient(var(--ink-1),var(--ink-1)) bottom/100% 1px no-repeat; }
  .wm { font-family: var(--font-display); font-weight: 700; font-size: 88px; line-height: 1; letter-spacing: -0.03em; color: var(--ink-1); }
  .row { display: flex; align-items: center; gap: 28px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); line-height: 1.7; }
</style>
</head>
<body>
  <p class="eyebrow">Marca · wordmark</p>
  <hr class="d">
  <div class="row">
    <div class="wm">morf<span style="color:var(--rubric-2); font-weight:800;">·</span>x</div>
    <div class="spec">
      EB Garamond · 800 <br>
      88 px · tracking −0.03 em <br>
      rubric-2 dot separator <br>
      clear-space = cap-height
    </div>
  </div>
</body>
</html>
