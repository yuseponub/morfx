<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>morfx — Message bubbles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--paper-1); }
  body { font-family: var(--font-serif); color: var(--ink-1); padding: 20px 24px; }
  .eyebrow { font-variant: small-caps; letter-spacing: 0.1em; color: var(--rubric-2); font-size: 12px; margin: 0 0 4px; font-weight: 600; }
  hr.d { height: 5px; border: 0; margin: 6px 0 14px; background: linear-gradient(var(--ink-1),var(--ink-1)) top/100% 1px no-repeat, linear-gradient(var(--ink-1),var(--ink-1)) bottom/100% 1px no-repeat; }
  .thread { display: flex; flex-direction: column; gap: 8px; max-width: 580px; }
  .row { display: flex; }
  .row.own { justify-content: flex-end; }
  .b { max-width: 72%; padding: 10px 14px; border-radius: 10px; font-family: var(--font-sans); font-size: 15px; line-height: 1.5; font-weight: 500; border: 1px solid var(--ink-2); background: var(--paper-0); color: var(--ink-1); position: relative; box-shadow: 0 1px 0 var(--border); }
  .b.own { background: var(--ink-1); color: var(--paper-0); border-color: var(--ink-1); border-bottom-right-radius: 2px; }
  .b.in { border-bottom-left-radius: 2px; }
  .b .t { font-family: var(--font-mono); font-size: 11px; font-weight: 500; opacity: 0.75; margin-top: 6px; display: block; text-align: right; letter-spacing: 0.02em; }
  .b.own .t { opacity: 0.85; color: var(--paper-2); }
  .bot { font-family: var(--font-sans); font-weight: 600; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rubric-2); margin: 0 4px 3px auto; text-align: right; }
</style>
</head>
<body>
  <p class="eyebrow">Componentes · mensajería</p>
  <hr class="d">
  <div class="thread">
    <div class="row"><div class="b in">Hola, ¿todavía tienen el pedido disponible para el jueves? <span class="t">09:42</span></div></div>
    <div class="row own"><div style="max-width:70%;"><div class="bot">Bot</div><div class="b own">Sí, tenemos disponibilidad. ¿Prefiere entrega en la mañana o tarde?<span class="t">09:43 ✓✓</span></div></div></div>
    <div class="row"><div class="b in">En la mañana, por favor. Misma dirección. <span class="t">09:44</span></div></div>
    <div class="row own"><div class="b own">Listo. Confirmado para el jueves 09:00–12:00. Le enviaré el comprobante.<span class="t">09:45 ✓✓</span></div></div>
  </div>
</body>
</html>
