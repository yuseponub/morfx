<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Input</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    .widget {
      -webkit-app-region: drag;
      background: rgba(26, 26, 46, 0.94);
      border-radius: 14px;
      border: 1px solid rgba(100, 100, 180, 0.25);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      height: 52px;
      transition: border-color 0.3s;
    }

    .widget.recording {
      border-color: rgba(255, 68, 68, 0.5);
      box-shadow: 0 0 12px rgba(255, 68, 68, 0.15);
    }

    /* Status dot */
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }
    .dot.active {
      background: #ff4444;
      animation: pulse 1s infinite;
    }
    .dot.screen-active {
      background: #4ade80;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Buttons */
    .btn {
      -webkit-app-region: no-drag;
      width: 36px; height: 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
      background: rgba(45, 58, 74, 0.8);
      color: #ccc;
    }
    .btn:hover { background: rgba(60, 75, 95, 0.9); transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }

    .btn-record { background: rgba(108, 99, 255, 0.7); color: white; }
    .btn-record:hover { background: rgba(108, 99, 255, 0.9); }
    .btn-record.recording { background: rgba(255, 68, 68, 0.8); }
    .btn-record.recording:hover { background: rgba(255, 68, 68, 1); }

    .btn-screen { color: #60a5fa; }
    .btn-config { width: 28px; height: 28px; font-size: 13px; color: #888; }

    /* Config panel */
    .config-panel {
      -webkit-app-region: no-drag;
      display: none;
      background: rgba(26, 26, 46, 0.96);
      border: 1px solid rgba(100, 100, 180, 0.25);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 10px 14px;
    }
    .config-panel.open { display: block; }

    .config-panel label {
      font-size: 0.75rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .config-panel select {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.75rem;
      max-width: 200px;
      -webkit-app-region: no-drag;
    }

    .config-panel input[type="checkbox"] {
      -webkit-app-region: no-drag;
    }

    /* Status text (tooltip-like) */
    .status-text {
      font-size: 0.65rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
      flex-shrink: 1;
    }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <div class="dot" id="dot"></div>
    <button class="btn btn-record" id="recordBtn" title="Grabar / Parar (Ctrl+Shift+Space)">&#x1F3A4;</button>
    <button class="btn btn-screen" id="screenBtn" title="Capturar pantalla (Ctrl+Shift+S)">&#x1F5A5;</button>
    <div class="dot" id="screenDot" style="margin-left: -4px;"></div>
    <span class="status-text" id="statusText">Listo</span>
    <button class="btn btn-config" id="configBtn" title="Configuracion">&#x2699;</button>
  </div>

  <div class="config-panel" id="configPanel">
    <label>
      Mic:
      <select id="micSelect"></select>
    </label>
    <label>
      <input type="checkbox" id="gptCorrection" checked>
      Auto-corregir con GPT
    </label>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
