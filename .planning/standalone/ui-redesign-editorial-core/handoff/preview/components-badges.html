<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>morfx — Badges & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--paper-1); }
  body { font-family: var(--font-serif); color: var(--ink-1); padding: 20px 24px; }
  .eyebrow { font-variant: small-caps; letter-spacing: 0.1em; color: var(--rubric-2); font-size: 12px; margin: 0 0 4px; font-weight: 600; }
  hr.d { height: 5px; border: 0; margin: 6px 0 14px; background: linear-gradient(var(--ink-1),var(--ink-1)) top/100% 1px no-repeat, linear-gradient(var(--ink-1),var(--ink-1)) bottom/100% 1px no-repeat; }
  .row { display:flex; gap: 8px; align-items:center; flex-wrap: wrap; margin-bottom: 10px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); width: 80px; font-weight: 500; }
  /* Filled tags — soft tinted fill + dark ink for legibility */
  .tag { display: inline-flex; align-items:center; gap: 6px; font-family: var(--font-sans); font-weight: 600; font-size: 11px; letter-spacing: 0.02em; padding: 4px 10px; border-radius: 999px; border: 1px solid transparent; color: var(--ink-1); background: var(--paper-3); }
  .tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-2); }
  .tag.cliente   { background: oklch(0.92 0.045 28);  color: oklch(0.32 0.09 28);  border-color: oklch(0.80 0.07 28); }
  .tag.cliente .dot   { background: var(--rubric-2); }
  .tag.vip       { background: oklch(0.94 0.055 80);  color: oklch(0.38 0.065 70); border-color: oklch(0.82 0.07 80); }
  .tag.vip .dot       { background: var(--accent-gold); }
  .tag.prospecto { background: oklch(0.93 0.035 260); color: oklch(0.30 0.06 260); border-color: oklch(0.80 0.05 260); }
  .tag.prospecto .dot { background: var(--accent-indigo); }
  .tag.dev       { background: oklch(0.93 0.03 180);  color: oklch(0.32 0.04 180); border-color: oklch(0.80 0.04 180); }
  .tag.dev .dot       { background: var(--accent-verdigris); }
  /* Solid variant */
  .tag.solid.cliente   { background: var(--rubric-2);        color: var(--paper-0); border-color: var(--rubric-1); }
  .tag.solid.cliente .dot   { background: var(--paper-0); }
  .tag.solid.vip       { background: var(--accent-gold);     color: oklch(0.22 0.06 70); border-color: oklch(0.55 0.07 70); }
  .tag.solid.vip .dot       { background: oklch(0.22 0.06 70); }
  .tag.solid.prospecto { background: var(--accent-indigo);   color: var(--paper-0); border-color: oklch(0.30 0.05 260); }
  .tag.solid.prospecto .dot { background: var(--paper-0); }
  .tag.solid.dev       { background: var(--accent-verdigris);color: var(--paper-0); border-color: oklch(0.36 0.04 180); }
  .tag.solid.dev .dot       { background: var(--paper-0); }
  .pill { display:inline-flex; align-items:center; justify-content:center; min-width: 22px; height: 22px; padding: 0 7px; border-radius: 999px; background: var(--rubric-2); color: var(--paper-0); font-family: var(--font-sans); font-size: 11px; font-weight: 700; }
  .count { display:inline-flex; align-items:center; gap: 4px; font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--ink-3); }
</style>
</head>
<body>
  <p class="eyebrow">Componentes · etiquetas</p>
  <hr class="d">
  <div class="row"><span class="lbl">tinted</span>
    <span class="tag cliente"><span class="dot"></span>Cliente</span>
    <span class="tag vip"><span class="dot"></span>Vip</span>
    <span class="tag prospecto"><span class="dot"></span>Prospecto</span>
    <span class="tag dev"><span class="dot"></span>Mayorista</span>
    <span class="tag"><span class="dot"></span>Sin asignar</span>
  </div>
  <div class="row"><span class="lbl">solid</span>
    <span class="tag solid cliente"><span class="dot"></span>Cliente</span>
    <span class="tag solid vip"><span class="dot"></span>Vip</span>
    <span class="tag solid prospecto"><span class="dot"></span>Prospecto</span>
    <span class="tag solid dev"><span class="dot"></span>Mayorista</span>
  </div>
  <div class="row"><span class="lbl">counters</span>
    <span class="pill">3</span>
    <span class="pill" style="background: var(--ink-1);">12</span>
    <span class="pill" style="background: var(--accent-gold); color: oklch(0.22 0.06 70);">99+</span>
    <span class="count">❦ <em>sin leer</em></span>
  </div>
</body>
</html>
